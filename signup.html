<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Create Account | Stackly Security</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html {
            height: 100%; margin: 0;
            background: linear-gradient(135deg, rgba(5,8,16,1) 0%, rgba(10,20,35,1) 100%);
            overflow: hidden;
        }
        .bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/img_32.webp') center/cover;
            filter: grayscale(80%) contrast(120%) brightness(0.3);
            z-index: 0;
        }
        .glowing-orb {
            position: absolute; width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.15; z-index: 1;
            animation: pulse-glow 8s infinite alternate;
        }
        @keyframes pulse-glow { 0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1;} 100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.2; } }

        .auth-container {
            width: 100%; max-width: 500px; padding: 3rem;
            background: rgba(15,20,35,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            animation: slideUp 0.6s ease-out forwards;
            position: relative;
            z-index: 10;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .logo-auth { text-align: center; margin-bottom: 2rem; font-size: 2rem; color: #fff; font-weight: 800; text-decoration: none; display: block; }
        
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-control {
            width: 100%; padding: 1rem 1.5rem 1rem 3rem;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: var(--text-color); font-size: 1rem; transition: var(--transition);
        }
        .form-control:focus { outline: none; border-color: var(--accent-color); background: rgba(0, 240, 255, 0.05); }
        .form-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); }
        
        .auth-error { color: #ff3366; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    </style>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="site-wrapper" style="overflow-x: hidden; width: 100%; position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div class="bg-video"></div>
    <div class="glowing-orb"></div>

    <div class="auth-container">
        <a href="index.html" class="logo-auth" style="display:flex; align-items:center; justify-content:center;"><img src="assets/logo.webp" alt="Stackly Logo" style="height: 32px; width: auto;"></a>
        
        <h2 class="text-gradient text-center" style="margin-bottom: 0.5rem;">Create Account</h2>
        <p class="text-center" style="color:rgba(255,255,255,0.6); margin-bottom: 2rem; font-size:0.9rem;">Join the future of autonomous security.</p>

        <form id="signupForm">
            <div class="form-group">
                <i class="fa-solid fa-user form-icon"></i>
                <input type="text" id="name" class="form-control" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <i class="fa-solid fa-envelope form-icon"></i>
                <input type="email" id="email" class="form-control" placeholder="Work Email" required>
                <div class="auth-error" id="emailError">Please enter a valid email address.</div>
            </div>
            
            <div class="form-group">
                <i class="fa-solid fa-lock form-icon"></i>
                <input type="password" id="password" class="form-control" placeholder="Password (Min 8 chars)" required minlength="8">
            </div>

            <div class="form-group">
                <i class="fa-solid fa-shield-check form-icon"></i>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                <div class="auth-error" id="passwordError">Passwords do not match.</div>
            </div>

            <button type="submit" class="btn btn-solid" style="width:100%; padding:1rem; font-size:1.1rem; box-shadow: 0 0 20px var(--accent-glow);">Register Account</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color:rgba(255,255,255,0.6); font-size:0.9rem;">
            Already have an account? <a href="login.html" class="text-accent">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            let isValid = true;

            // Reset errors
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('emailError').style.display = 'none';
            
            // Basic Email validation
            if (!email.includes('@')) {
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            }
            
            // Password match validation
            if (password !== confirmPassword) {
                document.getElementById('passwordError').style.display = 'block';
                isValid = false;
            }

            if (isValid) {
                // Simulate API call and redirect
                const btn = document.querySelector('button[type="submit"]');
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';
                
                setTimeout(() => {
                    // Redirect to login page on success as requested
                    window.location.href = 'login.html';
                }, 1500);
            }
        });
    </script>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
    </script>
</body>
</html>
